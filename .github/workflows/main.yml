name: CI - Express API

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Instal·lar dependències
        run: npm install

      - name: Comprovar que el projecte carrega
        run: node -e "require('./index.js')"