name: CI - Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Obté el codi del repo
      - name: Checkout del codi
        uses: actions/checkout@v3

      # Instal·la Node.js
      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # Instal·la dependències
      - name: Instal·lar dependències
        run: npm install

      # Executa els tests
      - name: Executar tests
        run: npm test